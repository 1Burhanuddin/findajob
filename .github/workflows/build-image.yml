name: Build and push image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

# Serialize per-ref so two pushes to the same branch / tag never race on
# `:latest` (or `:pr-{N}`). Earlier runs finish; later runs queue rather than
# clobber. Without this, two main merges in close succession can publish
# `:latest` pointing at the second-to-finish push instead of HEAD (#438).
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # QEMU enables arm64 emulation on the amd64 runner so buildx produces a
      # manifest list covering both architectures from a single job. Native
      # arm64 runners would be faster but require self-hosted infra; qemu
      # emulation is the right default at our build cadence.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          IMAGE="ghcr.io/${REPO_OWNER}/findajob"
          TAGS=""
          if [[ "${GITHUB_REF}" == refs/tags/v*.*.* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"              # v0.1.3
            MINOR="${VERSION%.*}"                            # v0.1
            TAGS="${IMAGE}:${VERSION},${IMAGE}:${MINOR},${IMAGE}:latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            SHA="${GITHUB_SHA::7}"
            TAGS="${IMAGE}:main-${SHA},${IMAGE}:latest"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            # PR builds publish only :pr-{N} — :latest stays aligned with main HEAD.
            # The PR-branch image lets pre-merge walkthrough verification
            # (e.g. findajob-test) run against the actual PR code.
            TAGS="${IMAGE}:pr-${PR_NUMBER}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
