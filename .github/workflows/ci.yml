name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (from locked uv.lock)
        # Resolve from the committed lockfile, not the >= floors in pyproject.
        # `uv sync --locked` fails loudly if uv.lock has drifted from pyproject
        # (vs --frozen, which silently uses a stale lock) and verifies the
        # lockfile's hashes natively. Now that pyproject declares a
        # [build-system], this single step installs both the dependency tree
        # and findajob (editable) into .venv — so the lint/type/test steps
        # below run through `uv run`.
        run: |
          pip install uv==0.11.7
          # Pin the venv to the setup-python interpreter above (3.12), not a
          # uv-downloaded or higher system Python, so CI stays a 3.12 gate.
          uv sync --locked --extra dev --python "$(which python)"

      - name: Lint
        run: uv run ruff check src/ scripts/ tests/

      - name: Format check
        run: uv run ruff format --check src/ scripts/ tests/

      - name: Type check
        run: uv run mypy src/findajob/

      - name: Test
        run: uv run pytest tests/ -v

  docker-build-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: findajob:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke — aichat-ng absent (#472)
        run: |
          if docker run --rm findajob:ci-smoke test -f /usr/local/bin/aichat-ng; then
            echo "FAIL: /usr/local/bin/aichat-ng still present in image"; exit 1
          fi
          echo "OK: aichat-ng binary absent"

      - name: Smoke — supercronic validates the crontab
        run: docker run --rm findajob:ci-smoke supercronic -test /app/crontab

      - name: Smoke — Python package imports
        run: |
          docker run --rm \
            -e JSP_BASE=/app \
            findajob:ci-smoke \
            python3 -c "import findajob; import findajob.paths; print(findajob.paths.BASE)"

      - name: Smoke — entrypoint creates runtime user without error
        run: |
          docker run --rm \
            -e PUID=1001 -e PGID=1001 \
            findajob:ci-smoke \
            id findajob

      - name: Smoke — entrypoint reconciles root-owned file inside managed dir
        run: |
          mkdir -p /tmp/test-entrypoint-logs
          sudo touch /tmp/test-entrypoint-logs/pipeline.jsonl
          owner=$(docker run --rm \
            -e PUID=1001 -e PGID=1001 \
            -v /tmp/test-entrypoint-logs:/app/logs \
            findajob:ci-smoke \
            stat -c '%u' /app/logs/pipeline.jsonl)
          [ "$owner" = "1001" ] || { echo "FAIL: expected owner 1001, got $owner"; exit 1; }
