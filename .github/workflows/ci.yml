name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ scripts/ tests/

      - name: Format check
        run: ruff format --check src/ scripts/ tests/

      - name: Type check
        run: mypy src/findajob/

      - name: Test
        run: pytest tests/ -v

  docker-build-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: findajob:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke — aichat-ng executes
        run: docker run --rm findajob:ci-smoke aichat-ng --version

      - name: Smoke — supercronic validates the crontab
        run: docker run --rm findajob:ci-smoke supercronic -test /app/crontab

      - name: Smoke — Python package imports
        run: |
          docker run --rm \
            -e JSP_BASE=/app \
            findajob:ci-smoke \
            python3 -c "import findajob; import findajob.paths; print(findajob.paths.BASE)"

      - name: Smoke — entrypoint creates runtime user without error
        run: |
          docker run --rm \
            -e PUID=1001 -e PGID=1001 \
            findajob:ci-smoke \
            id findajob

      - name: Smoke — entrypoint reconciles root-owned file inside managed dir
        run: |
          mkdir -p /tmp/test-entrypoint-logs
          sudo touch /tmp/test-entrypoint-logs/pipeline.jsonl
          owner=$(docker run --rm \
            -e PUID=1001 -e PGID=1001 \
            -v /tmp/test-entrypoint-logs:/app/logs \
            findajob:ci-smoke \
            stat -c '%u' /app/logs/pipeline.jsonl)
          [ "$owner" = "1001" ] || { echo "FAIL: expected owner 1001, got $owner"; exit 1; }
