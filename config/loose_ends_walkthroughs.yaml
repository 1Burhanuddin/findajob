# Curated itinerary for the #572 phase-2 dynamic UX walkthrough.
# Adding a walkthrough = one entry below, no code changes.
# Schema: name, persona ({nux_user, established_user}), target_category ({2, 3}), steps.

walkthroughs:
  # ── nux_user @ findajob-clean ──────────────────────────────────────────────
  - name: dashboard_first_load
    persona: nux_user
    target_category: 3
    steps:
      - goto: /board/dashboard
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: applied_first_load_empty
    persona: nux_user
    target_category: 3
    steps:
      - goto: /board/applied
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: rejected_first_load_empty
    persona: nux_user
    target_category: 3
    steps:
      - goto: /board/rejected
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: materials_index_first_load
    persona: nux_user
    target_category: 3
    steps:
      - goto: /materials/
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: stats_first_load
    persona: nux_user
    target_category: 3
    steps:
      - goto: /stats/
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  # ── established_user @ findajob-staging ────────────────────────────────────
  - name: applied_to_interviewing_undo
    persona: established_user
    target_category: 2
    steps:
      - goto: /board/applied
      - assert_present: 'tr[data-stage="applied"]'
      - select_option:
          row_selector: 'tr[data-stage="applied"]'
          option_value: interview
      - evaluate_dom:
          category: 2
          rubric: flow_without_exit
          context_hint: "User just transitioned applied → interviewing"
      # #779: second pass on the same rendered DOM with the action-without-
      # confirmation rubric. flow_without_exit correctly returns false (nav
      # exists); action_without_confirmation is the rubric that catches the
      # operator-intuition concern (no visible feedback after stage change).
      - evaluate_dom:
          category: 4
          rubric: action_without_confirmation
          context_hint: "User just transitioned applied → interviewing"

  - name: interviewing_to_offer_path
    persona: established_user
    target_category: 2
    steps:
      - goto: /board/applied
      - assert_present: 'tr[data-stage="interview"]'
      - select_option:
          row_selector: 'tr[data-stage="interview"]'
          option_value: offer
      - evaluate_dom:
          category: 2
          rubric: flow_without_exit
          context_hint: "User just transitioned interviewing → offer"
      # #779: second pass — see applied_to_interviewing_undo comment.
      - evaluate_dom:
          category: 4
          rubric: action_without_confirmation
          context_hint: "User just transitioned interviewing → offer"

  - name: waitlist_then_reactivate
    persona: established_user
    target_category: 2
    steps:
      - goto: /board/waitlist
      - assert_present: 'tr[data-stage="waitlisted"]'
      - pick_first_row_with_stage: waitlisted
      - click_action: Reactivate
      - evaluate_dom:
          category: 2
          rubric: flow_without_exit
          context_hint: "User just reactivated a waitlisted job"

  - name: dashboard_all_filters_applied
    persona: established_user
    target_category: 3
    steps:
      # Use a recognized column (relevance_score) with an impossible threshold
      # so the filter actually applies and produces empty-state UX. The prior
      # ?col=__nonexistent__&col_min=99 URL was silently dropped by the
      # findajob.web.filters parser (cols_clean filters out unknown column
      # names), leaving the dashboard populated and defeating the empty-state
      # rubric check. See #751 AC1.
      - goto: /board/dashboard?relevance_score_min=99
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: rejected_view_with_data
    persona: established_user
    target_category: 3
    steps:
      - goto: /board/rejected
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  # AC3 expansion — surfaces missing from the original 5 (#751)
  - name: not_selected_default_view
    persona: established_user
    target_category: 3
    steps:
      - goto: /board/not-selected
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: archive_default_view
    persona: established_user
    target_category: 3
    steps:
      - goto: /board/archive
      - evaluate_dom:
          category: 3
          rubric: empty_state_no_guidance

  - name: materials_index_browse
    persona: established_user
    target_category: 2
    steps:
      - goto: /materials/
      - evaluate_dom:
          category: 2
          rubric: flow_without_exit
          context_hint: "User opened the materials index to find a prep folder"
