# LLM pricing table for cost estimation.
# Prices are USD per million tokens. Update as provider rates change.
# Only models in use by the pipeline are tracked here; others fall back
# to a default rate and get logged as best-effort estimates.
#
# Matching: cost_tracking.py looks up the longest prefix match of the
# OpenRouter model string, so "openrouter:anthropic/claude-opus-4.7"
# matches the entry below regardless of provider routing.
#
# Last updated: 2026-05-05 (v2 — opus-4.7 and gemini-3-flash rates corrected
# against empirical CoreWeave prep verification, #460)

default:
  input_per_mtok: 1.00
  output_per_mtok: 5.00

models:
  # OpenRouter — every production role routes through these strings.
  "openrouter:deepseek/deepseek-v3.2":
    input_per_mtok: 0.27
    output_per_mtok: 1.10
  "openrouter:anthropic/claude-opus-4.7":
    # Opus 4.7 priced lower than Opus 4 ($15/$75) at launch. Empirically
    # verified 2026-05-05 against 5 separate Opus calls in CoreWeave prep:
    # actual cost = 0.333× of $15/$75 rate-card across 6,769–44,048 input
    # tokens, ruling out caching as the explanation. (#460)
    input_per_mtok: 5.0
    output_per_mtok: 25.0
  "openrouter:anthropic/claude-sonnet-4.6":
    input_per_mtok: 3.0
    output_per_mtok: 15.0
  "openrouter:google/gemini-3-flash-preview":
    # Gemini 3 Flash Preview is priced higher than Gemini 2 Flash ($0.10/$0.40).
    # Back-calculated 2026-05-05 from one Vertex-routed call:
    # 11,370 in × X + 876 out × 4X = $0.00831 → X ≈ $0.55/Mtok. (#460)
    input_per_mtok: 0.55
    output_per_mtok: 2.20
  "openrouter:perplexity/sonar-reasoning-pro":
    # Per-request search fee (~$0.005/call) NOT modeled — char-heuristic will
    # under-attribute by that amount per call. Acceptable within ±30% target.
    input_per_mtok: 2.0
    output_per_mtok: 8.0
  "openrouter:perplexity/sonar-deep-research":
    input_per_mtok: 5.0
    output_per_mtok: 20.0
