{# Shared Chart.js annotation plugin for config-change vertical markers.
   Include this partial after the Chart.js CDN script. Adds vertical lines
   at config_changes.changed_at timestamps; click opens a before/after popover.
#}
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<script>
window.ConfigMarkerPlugin = ChartAnnotation;
window.addConfigMarkers = function(chart, markers) {
  if (!markers || !markers.length) return;
  var annotations = {};
  markers.forEach(function(m, i) {
    annotations['marker_' + i] = {
      type: 'line',
      xMin: m.date,
      xMax: m.date,
      borderColor: 'rgba(220, 38, 38, 0.6)',
      borderWidth: 1.5,
      borderDash: [4, 4],
      label: {
        content: m.lever,
        display: true,
        position: 'start',
        backgroundColor: 'rgba(220, 38, 38, 0.8)',
        color: '#fff',
        font: { size: 10 },
        padding: 3,
      },
    };
  });
  chart.options.plugins.annotation = { annotations: annotations };
  chart.update();
};
window.configMarkerClickHandler = function(chart, markers, canvas) {
  if (!markers || !markers.length) return;
  canvas.style.cursor = 'pointer';
  canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var xScale = chart.scales.x;
    if (!xScale) return;
    for (var i = 0; i < markers.length; i++) {
      var m = markers[i];
      var pixel = xScale.getPixelForValue(m.date);
      if (Math.abs(x - pixel) < 12) {
        showBeforeAfterPopover(e, m.date, m.lever);
        return;
      }
    }
  });
};
function showBeforeAfterPopover(event, changeDate, lever) {
  var existing = document.getElementById('config-popover');
  if (existing) existing.remove();

  var pop = document.createElement('div');
  pop.id = 'config-popover';
  pop.className = 'absolute z-50 bg-white border border-slate-300 rounded-lg shadow-lg p-4 text-sm max-w-sm';
  pop.style.left = event.pageX + 'px';
  pop.style.top = (event.pageY + 10) + 'px';

  var header = document.createElement('div');
  header.className = 'font-semibold mb-2';
  header.textContent = lever + ' changed on ' + changeDate;
  pop.appendChild(header);

  var loading = document.createElement('div');
  loading.className = 'text-slate-500';
  loading.textContent = 'Loading comparison…';
  pop.appendChild(loading);

  document.body.appendChild(pop);

  fetch('/stats/config-change/' + encodeURIComponent(changeDate))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        loading.textContent = String(data.error);
        return;
      }
      pop.textContent = '';
      var b = data.before, a = data.after, d = data.delta;

      var hdr = document.createElement('div');
      hdr.className = 'flex justify-between items-start mb-2';
      var title = document.createElement('span');
      title.className = 'font-semibold';
      title.textContent = lever + ' — ' + changeDate;
      hdr.appendChild(title);
      var close = document.createElement('button');
      close.className = 'text-slate-400 hover:text-slate-600 ml-2';
      close.textContent = '✕';
      close.addEventListener('click', function() { pop.remove(); });
      hdr.appendChild(close);
      pop.appendChild(hdr);

      var tbl = document.createElement('table');
      tbl.className = 'w-full text-xs';
      var thead = document.createElement('thead');
      var headRow = document.createElement('tr');
      ['', '7d before', '7d after', 'Δ'].forEach(function(t) {
        var th = document.createElement('th');
        th.textContent = t;
        if (t) th.className = 'text-right';
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      tbl.appendChild(thead);

      var tbody = document.createElement('tbody');
      function addRow(label, bVal, aVal, delta, unit, invert) {
        var tr = document.createElement('tr');
        var tdLabel = document.createElement('td');
        tdLabel.textContent = label;
        tr.appendChild(tdLabel);
        var tdB = document.createElement('td');
        tdB.className = 'text-right';
        tdB.textContent = bVal;
        tr.appendChild(tdB);
        var tdA = document.createElement('td');
        tdA.className = 'text-right';
        tdA.textContent = aVal;
        tr.appendChild(tdA);
        var tdD = document.createElement('td');
        tdD.className = 'text-right';
        if (delta !== null && delta !== undefined) {
          var good = invert ? delta < 0 : delta > 0;
          tdD.className += good ? ' text-green-600' : ' text-red-600';
          tdD.textContent = (delta > 0 ? '+' : '') + delta + unit;
        } else {
          tdD.textContent = '—';
        }
        tr.appendChild(tdD);
        tbody.appendChild(tr);
      }
      addRow('Reject rate', b.precision_pct + '%', a.precision_pct + '%', d.precision_pct, 'pp', true);
      addRow('Cost/applied', '$' + b.cost_per_applied, '$' + a.cost_per_applied, d.cost_pct, '%', true);
      addRow('Scored', String(b.n_scored), String(a.n_scored), null, '', false);
      addRow('Applied', String(b.n_applied), String(a.n_applied), null, '', false);
      tbl.appendChild(tbody);
      pop.appendChild(tbl);
    })
    .catch(function() {
      loading.textContent = 'Failed to load.';
    });

  setTimeout(function() {
    document.addEventListener('click', function handler(e) {
      if (!pop.contains(e.target)) {
        pop.remove();
        document.removeEventListener('click', handler);
      }
    });
  }, 100);
}
</script>
