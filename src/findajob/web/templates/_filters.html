{# Filter input that swaps the #rows tbody via HTMX on each keystroke.
   Hidden sort/desc inputs let hx-include carry the current sort state to the
   /rows endpoint so filtering doesn't reset column sort. #}
{% set current_density = density | default('compact') %}
<div class="mb-3 flex items-center gap-3 flex-wrap">
  <form class="flex-1 min-w-[12rem]">
    <input type="hidden" name="sort" value="{{ sort }}">
    <input type="hidden" name="desc" value="{{ desc }}">
    <input type="text" name="q" placeholder="Filter by title or company..."
           class="border border-slate-300 rounded px-3 py-1 w-full md:w-1/2"
           hx-get="{{ request.url.path }}/rows"
           hx-trigger="keyup changed delay:200ms"
           hx-target="#rows"
           hx-swap="innerHTML"
           hx-include="[name='sort'],[name='desc']">
  </form>
  <div class="text-xs text-slate-600 flex items-center gap-1">
    <span>Rows:</span>
    <a href="?sort={{ sort }}&desc={{ desc }}&density=compact"
       class="rounded px-2 py-1 {% if current_density == 'compact' %}bg-slate-900 text-white{% else %}bg-slate-100 text-slate-700 hover:bg-slate-200{% endif %}">Compact</a>
    <a href="?sort={{ sort }}&desc={{ desc }}&density=expanded"
       class="rounded px-2 py-1 {% if current_density == 'expanded' %}bg-slate-900 text-white{% else %}bg-slate-100 text-slate-700 hover:bg-slate-200{% endif %}">Expanded</a>
  </div>
</div>
