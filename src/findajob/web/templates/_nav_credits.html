{# Nav-bar spend chip — current calendar-month LLM spend in USD.
   Sourced from `cost_log.cost_usd` (OpenRouter `response.usage.cost`). #}
{% if spend_this_month_for_template is defined %}
  {% set spent = spend_this_month_for_template() %}
  <li id="nav-credits" class="ml-auto">
    <span class="text-xs px-2 py-1 rounded border bg-slate-700/40 border-slate-500/40 text-slate-100 font-mono"
          title="LLM spend this calendar month — sum of cost_log.cost_usd from response.usage.cost (UTC month boundary).">
      ${{ '%.2f' | format(spent) }} this month
    </span>
  </li>
{% endif %}
