{% extends "base.html" %}
{% block title %}Docs — findajob{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-2">Docs</h1>
<p class="text-slate-600 mb-4">User-facing guides for running findajob.</p>
<div class="mb-6 p-4 bg-sky-50 border border-sky-200 rounded-lg">
  <a class="text-sky-700 hover:text-sky-900 font-medium text-lg" href="/docs/getting-started/start-here-fly">New here? Start with Getting Started &rarr;</a>
</div>
<ul class="space-y-4">
  {% for guide in guides %}
  <li>
    <a class="text-lg font-medium text-sky-700 hover:text-sky-900 underline" href="/docs/{{ guide.slug }}">{{ guide.title }}</a>
    <p class="text-slate-600 mt-1">{{ guide.blurb }}</p>
  </li>
  {% endfor %}
</ul>
{% endblock %}
