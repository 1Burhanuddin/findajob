{#
  Status dropdown for the Dashboard and Applied tabs. Inputs:
    row — a sqlite3.Row (or dict) for the current job
    tab — "dashboard" | "applied"
  On selection, dispatches an HTMX POST to /board/jobs/{fp}/{action} where
  {action} matches the <option value>. Response body replaces the <tr>.
#}
{% set fp = row.fingerprint %}
{% set stage = row.stage %}
<td class="px-3 py-1 align-top text-sm whitespace-nowrap">
  {% if tab == 'dashboard' %}
    <div class="flex items-center gap-2">
      {% if stage == 'prep_in_progress' %}
        <span class="text-xs text-slate-500" title="Prep subprocess running">Prep…</span>
      {% elif stage == 'materials_drafted' %}
        <span class="text-xs font-medium text-emerald-700" title="Materials drafted — ready to apply">Ready</span>
      {% endif %}
      <select
        class="block rounded border-slate-300 bg-white px-2 py-1 text-xs"
        data-fp="{{ fp }}"
        onchange="if(!this.value)return;
          const v=this.value;this.value='';
          if(v==='regenerate'){htmx.ajax('GET',`/board/jobs/{{ fp }}/regenerate/confirm`,{target:this.closest('td'),swap:'outerHTML'});}
          else{htmx.ajax('POST',`/board/jobs/{{ fp }}/${v}`,{target:this.closest('tr'),swap:'outerHTML'});}">
        <option value="">— Change status —</option>
        {% if stage in ('scored', 'manual_review') %}
          <option value="prep">Flag for Prep</option>
        {% endif %}
        {% if stage in ('prep_in_progress', 'materials_drafted') %}
          <option value="regenerate">Regenerate</option>
        {% endif %}
        <option value="waitlist">Waitlist</option>
        {% if stage == 'materials_drafted' %}
          {% if row.title and row.title.startswith('[SPEC]') %}
            <option value="apply">Sent Outreach</option>
          {% else %}
            <option value="apply">Applied</option>
          {% endif %}
        {% endif %}
      </select>
    </div>
  {% elif tab == 'applied' %}
    {% if stage == 'not_selected' %}
      <span class="text-xs text-slate-500">Not Selected</span>
    {% else %}
    {# #391: every status pick on Applied is a one-click action — picking
       "Not Selected" fires /not-selected immediately with empty reason
       (handler defaults to "Company passed"). The earlier two-step flow
       that required the user to also pick a reason was a UX trap; the
       reject-cell coordination + hint span + dataset.pendingAction logic
       are gone. The reject cell on Applied is rendered as an inert dash
       (see _reject_cell.html). #}
    <select
      class="block rounded border-slate-300 bg-white px-2 py-1 text-xs"
      data-fp="{{ fp }}"
      onchange="if(!this.value)return;
        const tr=this.closest('tr');
        htmx.ajax('POST',`/board/jobs/{{ fp }}/${this.value}`,{target:tr,swap:'outerHTML'});
        this.value='';">
      <option value="">— Change status —</option>
      {% if stage != 'interview' %}<option value="interview">Interviewing</option>{% endif %}
      {% if stage != 'offer' %}<option value="offer">Offer</option>{% endif %}
      <option value="withdraw">Withdrew</option>
      <option value="not-selected">Not Selected</option>
    </select>
    {% endif %}
  {% elif tab == 'review' %}
    <div class="flex gap-1">
      <button type="button"
              class="rounded bg-indigo-600 px-2 py-1 text-xs font-medium text-white hover:bg-indigo-500"
              hx-post="/board/jobs/{{ fp }}/promote"
              hx-target="closest tr"
              hx-swap="outerHTML">Promote</button>
      <button type="button"
              class="rounded bg-slate-100 px-2 py-1 text-xs font-medium text-slate-700 hover:bg-slate-200"
              hx-post="/board/jobs/{{ fp }}/waitlist"
              hx-target="closest tr"
              hx-swap="outerHTML"
              title="Defer to Waitlist without promoting">Waitlist</button>
    </div>
  {% elif tab == 'waitlist' %}
    <div class="flex gap-1">
      <button type="button"
              class="rounded bg-indigo-600 px-2 py-1 text-xs font-medium text-white hover:bg-indigo-500"
              hx-post="/board/jobs/{{ fp }}/reactivate"
              hx-target="closest tr"
              hx-swap="outerHTML">Reactivate</button>
      <button type="button"
              class="rounded bg-emerald-600 px-2 py-1 text-xs font-medium text-white hover:bg-emerald-500"
              hx-post="/board/jobs/{{ fp }}/reactivate-and-prep"
              hx-target="closest tr"
              hx-swap="outerHTML"
              title="Reactivate and start prep in one step">Flag for Prep</button>
    </div>
  {% endif %}
</td>
