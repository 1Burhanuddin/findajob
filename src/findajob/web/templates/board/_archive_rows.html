{% for row in rows %}
  {% include "_job_row.html" %}
{% endfor %}
{% if next_offset is not none %}
  {% set base_qs = filter_qs_with(request.url.query, 'offset', next_offset | string) %}
  <tr hx-get="/board/archive/rows?{{ base_qs }}"
      hx-trigger="revealed"
      hx-swap="outerHTML">
    {% set spec_count = (specs | selectattr('name', 'in', visible) | list | length) %}
    <td colspan="{{ spec_count + 1 }}" class="px-3 py-2 text-xs text-slate-400">loading…</td>
  </tr>
{% endif %}
