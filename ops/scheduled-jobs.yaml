# ops/scheduled-jobs.yaml — declarative manifest of supercronic-scheduled jobs.
#
# At container start, scripts/render_crontab.py reads this file plus env-var
# overrides and writes the rendered crontab to /app/crontab. supercronic then
# parses and executes it.
#
# Per-job env-var overrides (#344):
#   FINDAJOB_<JOB>_SCHEDULE  — replaces `schedule:` field for that job
#   FINDAJOB_<JOB>_ENABLED   — "true"/"false"; false drops the line
#
# <JOB> = upper-cased job name with hyphens converted to underscores. So
# the `notify-apply` job key reads from FINDAJOB_NOTIFY_APPLY_SCHEDULE and
# FINDAJOB_NOTIFY_APPLY_ENABLED. Document any operator-overridden values in
# the stack's `.env` so multi-tenant hosts don't collide on the same minute.
#
# Add a new job: append a top-level entry. Disable permanently: delete it.
# Disable temporarily: set `enabled: false` (cleaner than deletion, since
# the YAML still records the canonical schedule for re-enable).
#
# All times evaluate against the container's TZ env var (compose `TZ:` slot).

jobs:
  triage:
    schedule: "0 0 * * *"
    command: "timeout ${FINDAJOB_TRIAGE_TIMEOUT:-7200} python3 /app/scripts/triage.py"
    description: "Daily ingest + scoring (LinkedIn / Greenhouse / Ashby / Lever / Gmail)."
    enabled: true

  watchdog:
    schedule: "*/10 * * * *"
    command: "timeout 900 python3 /app/scripts/watchdog.py"
    description: "Reset jobs stuck in prep_in_progress > 60 min; fail stuck speculative > 10 min."
    enabled: true

  notify-apply:
    schedule: "0 6 * * *"
    command: "python3 /app/scripts/notify.py apply-reminder"
    description: "Daily morning apply reminder ntfy."
    enabled: true

  notify-stats:
    schedule: "15 6 * * *"
    command: "python3 /app/scripts/notify.py daily-stats"
    description: "Daily morning summary ntfy."
    enabled: true

  notify-health:
    schedule: "0 7 * * *"
    command: "python3 /app/scripts/notify.py health-check"
    description: "Backlog + silent-source warnings (after triage finishes)."
    enabled: true

  notify-feedback:
    schedule: "0 8 * * 0"
    command: "python3 /app/scripts/notify.py feedback-review"
    description: "Sunday morning feedback-review push."
    enabled: true

  discover:
    schedule: "0 2 * * 0"
    command: "timeout 600 python3 /app/scripts/discover_companies.py"
    description: "Sunday 02:00 — competency-driven company discovery (#284)."
    enabled: true

  detect-rejections:
    schedule: "*/30 * * * *"
    command: "timeout ${FINDAJOB_DETECT_REJECTIONS_TIMEOUT:-600} python3 /app/scripts/detect_rejections.py"
    description: "Scan Gmail for company rejection emails matching active applications; surface as suggestions (#362)."
    enabled: true

  staging-prep:
    schedule: "0 */6 * * *"
    command: "python3 -m findajob.staging.clicker --mode prep"
    description: "Staging only (#565): every 6h, exercise prep launcher on a random scored job. Disabled by default; FINDAJOB_STAGING_PREP_ENABLED=true on findajob-staging."
    enabled: false

  staging-interview:
    schedule: "0 14 * * 2"
    command: "python3 -m findajob.staging.clicker --mode interview"
    description: "Staging only (#565): Tue 14:00 PT, exercise interview launcher. Disabled by default."
    enabled: false

  staging-speculative:
    schedule: "0 15 * * 4"
    command: "python3 -m findajob.staging.clicker --mode speculative"
    description: "Staging only (#565): Thu 15:00 PT, exercise speculative ingest. Disabled by default."
    enabled: false

  staging-advance:
    schedule: "30 9 * * *"
    command: "python3 -m findajob.staging.clicker --mode advance"
    description: "Staging only (#565): daily 09:30 PT, age materials_drafted → applied so interview cron has candidates. Disabled by default."
    enabled: false

  recall-audit:
    schedule: "0 4 * * 0"
    command: "timeout 1800 python3 /app/scripts/recall_audit.py"
    description: "Sunday 04:00 — sample 40 hard-rejected/low-scored jobs, re-score with auditor model, alert if upgrade rate >10% (#230)."
    enabled: true

  drift-alert:
    schedule: "0 7 * * *"
    command: "timeout 120 python3 /app/scripts/drift_alert.py"
    description: "Daily 07:00 — check config_changes from 7 days ago, compute before/after metrics, alert on significant shifts (#230)."
    enabled: true
